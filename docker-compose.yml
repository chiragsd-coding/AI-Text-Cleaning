version: "3.9"

services:
  api:
    build: .
    container_name: ai-text-cleaning

    ports:
      - "8000:8000"

    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/invoiceocr

    depends_on:
      - db

    restart: unless-stopped

  db:
    image: postgres:16

    container_name: ai-text-cleaning-db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aitextcleaning

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped

volumes:
  postgres_data: